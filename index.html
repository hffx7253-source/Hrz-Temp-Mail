<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRZ TEMPMAIL</title>
    <meta name="description" content="Premium Temporary Email Service">
    <meta name="theme-color" content="#4f46e5">

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6366f1', // Indigo 500
                        secondary: '#8b5cf6', // Violet 500
                        accent: '#06b6d4', // Cyan 500
                        dark: '#0f172a', // Slate 900
                        darkCard: '#1e293b', // Slate 800
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                        'bounce-slight': 'bounce 2s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        /* Mobile Optimization */
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        /* Splash Screen */
        #splash {
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        /* Loader */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="font-sans antialiased text-slate-800 dark:text-slate-100 bg-gray-50 dark:bg-slate-900 transition-colors duration-300 min-h-screen overflow-hidden relative">

    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[60] w-11/12 max-w-sm space-y-2 pointer-events-none"></div>

    <!-- Main App Container -->
    <div class="h-full max-w-md mx-auto relative flex flex-col h-screen shadow-2xl overflow-hidden bg-white dark:bg-slate-900 transition-colors duration-300">

            </button>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto px-4 py-4 space-y-6 pb-24">
            
            <!-- Email Display Card -->
            <div class="relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-cyan-400 rounded-2xl blur opacity-30 group-hover:opacity-60 transition duration-500"></div>

                    <div class="flex gap-3 w-full">

                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            Copy

                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>

            <!-- Branding Footer -->
            <div class="mt-8 mb-4 flex flex-col items-center justify-center gap-3">
                <div class="w-full h-px bg-slate-200 dark:bg-slate-800"></div>

                    Made By Harsh
                </h3>
                <a href="https://youtube.com/@hrzcodez?si=UivDJ6n_-Nr2dPEX" target="_blank" class="flex items-center gap-2 px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-full text-sm font-semibold transition-transform hover:scale-105 shadow-lg shadow-red-500/30">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                    Subscribe HRZ CODEZ
                </a>
            </div>

        </main>
    </div>

    <!-- Email Details Modal -->
    <div id="email-modal" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        
        <!-- Modal Content -->
        <div class="absolute bottom-0 inset-x-0 top-10 md:top-20 md:bottom-auto md:inset-x-auto md:left-1/2 md:transform md:-translate-x-1/2 md:w-full md:max-w-md md:h-[80vh] bg-white dark:bg-slate-900 rounded-t-3xl md:rounded-2xl shadow-2xl flex flex-col overflow-hidden transition-transform duration-300 translate-y-full" id="modal-content">
            
            <!-- Modal Header -->
            <div class="flex justify-between items-start p-5 border-b border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 relative z-10">
                <div class="flex-1 pr-4">
                    <h3 id="modal-subject" class="text-lg font-bold text-slate-800 dark:text-white leading-tight mb-1">Subject</h3>
                    <div class="flex flex-col">
                        <span id="modal-from" class="text-sm font-medium text-indigo-600 dark:text-indigo-400">Sender Name</span>
                        <span id="modal-date" class="text-xs text-slate-400">Time</span>
                    </div>
                </div>
                <button onclick="closeModal()" class="bg-slate-100 dark:bg-slate-800 p-2 rounded-full text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="flex-1 bg-slate-50 dark:bg-slate-950 relative overflow-hidden">
                <iframe id="modal-body-frame" class="w-full h-full border-0" sandbox="allow-same-origin"></iframe>
            </div>
        </div>
    </div>

    <!-- JavaScript Application Logic -->
    <script>
        // --- Configuration & State ---
        const API_BASE = 'https://api.mail.tm';
        const SESSION_DURATION = 15 * 60; // 15 minutes in seconds
        
        const state = {
            email: null,
            token: null,
            accountId: null,
            password: null,
            messages: [],
            timer: SESSION_DURATION,
            timerInterval: null,
            refreshInterval: null,
            isDarkMode: localStorage.getItem('hrz_theme') === 'dark'
        };

        // --- Core Functions ---

        /**
         * Initialize the Application
         */
        async function initApp() {
            applyTheme();
            
            // Wait for splash screen (aesthetic)
            setTimeout(async () => {
                await startSession();
                
                // Remove splash
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 2000);
        }

        /**
         * Start a new email session
         */
        async function startSession() {
            clearInterval(state.refreshInterval);
            clearInterval(state.timerInterval);
            
            // Update UI to loading
            document.getElementById('email-address').value = "Generating ID...";
            renderEmptyInbox();

            try {
                // 1. Get Domains
                const domainsRes = await fetch(`${API_BASE}/domains`);
                if(!domainsRes.ok) throw new Error('Failed to fetch domains');
                const domainsData = await domainsRes.json();
                const domain = domainsData['hydra:member'][0].domain;

                // 2. Generate Credentials
                const randomUser = Math.random().toString(36).substring(2, 10);
                const password = Math.random().toString(36).substring(2, 12);
                const email = `${randomUser}@${domain}`;

                // 3. Create Account
                const accRes = await fetch(`${API_BASE}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: password })
                });
                
                if (accRes.status === 429) {
                     showToast('error', 'Rate limit hit. Please wait a moment.');
                     return;
                }
                
                if (!accRes.ok) throw new Error('Failed to create account');
                const accData = await accRes.json();

                // 4. Get Token
                const tokenRes = await fetch(`${API_BASE}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: email, password: password })
                });
                if (!tokenRes.ok) throw new Error('Failed to get token');
                const tokenData = await tokenRes.json();

                // 5. Update State
                state.email = email;
                state.password = password;
                state.accountId = accData.id;
                state.token = tokenData.token;
                state.timer = SESSION_DURATION;
                state.messages = [];

                // 6. Update UI
                document.getElementById('email-address').value = email;
                showToast('success', 'New temporary email created!');

                // 7. Start Intervals
                startTimer();
                startAutoRefresh();
                fetchInbox(); // Initial fetch

            } catch (error) {
                console.error(error);
                showToast('error', 'Connection error. Retrying...');
                setTimeout(startSession, 3000);
            }
        }

        /**
         * Fetch Inbox Messages
         */
        async function fetchInbox() {
            if (!state.token) return;

            // Show refreshing indicator
            const indicator = document.getElementById('refresh-indicator');
            indicator.style.opacity = '1';

            try {
                const res = await fetch(`${API_BASE}/messages`, {
                    headers: { 'Authorization': `Bearer ${state.token}` }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    const newMessages = data['hydra:member'];

                    // Check for new emails to notify
                    if (newMessages.length > state.messages.length) {
                         showToast('info', `You have ${newMessages.length - state.messages.length} new message(s)`);
                    }

                    state.messages = newMessages;
                    renderInbox();
                }
            } catch (error) {
                console.error("Fetch inbox error", error);
            } finally {
                setTimeout(() => {
                    indicator.style.opacity = '0';
                }, 1000);
            }
        }

        /**
         * Render Inbox UI
         */
        function renderInbox() {
            const listContainer = document.getElementById('inbox-list');
            
            if (state.messages.length === 0) {
                renderEmptyInbox();
                return;
            }

            let html = '';
            state.messages.forEach(msg => {
                const date = new Date(msg.createdAt);
                const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const initial = msg.from.name ? msg.from.name.charAt(0).toUpperCase() : msg.from.address.charAt(0).toUpperCase();
                
                html += `
                <div onclick="openEmail('${msg.id}')" class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 active:scale-[0.98] transition-transform cursor-pointer animate-fade-in hover:shadow-md">
                    <div class="flex items-start gap-3">
                        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-gradient-to-br from-indigo-400 to-cyan-400 flex items-center justify-center text-white font-bold shadow-sm">
                            ${initial}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-baseline mb-1">
                                <h3 class="text-sm font-bold text-slate-800 dark:text-slate-100 truncate pr-2">${msg.from.name || msg.from.address}</h3>
                                <span class="text-[10px] text-slate-400 whitespace-nowrap">${timeString}</span>
                            </div>
                            <h4 class="text-xs font-semibold text-slate-700 dark:text-slate-300 truncate mb-0.5">${msg.subject}</h4>
                            <p class="text-[11px] text-slate-500 dark:text-slate-400 truncate">${msg.intro || 'No preview available'}</p>
                        </div>
                    </div>
                </div>
                `;
            });
            listContainer.innerHTML = html;
        }

        function renderEmptyInbox() {
            document.getElementById('inbox-list').innerHTML = `
                <div class="flex flex-col items-center justify-center py-12 text-center opacity-60">
                    <div class="text-6xl mb-4 grayscale animate-bounce-slight">📭</div>
                    <p class="text-slate-500 dark:text-slate-400 font-medium">Waiting for emails...</p>
                    <p class="text-xs text-slate-400 dark:text-slate-500 mt-1 max-w-[200px]">Emails refresh automatically every 10 seconds.</p>
                </div>
            `;
        }

        /**
         * Open Email Details
         */
        async function openEmail(id) {
            // Show modal immediately with loading state
            const modal = document.getElementById('email-modal');
            const content = document.getElementById('modal-content');
            const iframe = document.getElementById('modal-body-frame');
            
            // Set Loading in Iframe
            iframe.srcdoc = `
                <style>body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:sans-serif;color:#888;background:transparent;}</style>
                <div>Loading message...</div>
            `;

            modal.classList.remove('hidden');
            // Trigger animation
            setTimeout(() => {
                content.classList.remove('translate-y-full');
            }, 10);

            try {
                const res = await fetch(`${API_BASE}/messages/${id}`, {
                    headers: { 'Authorization': `Bearer ${state.token}` }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    
                    // Update Headers
                    document.getElementById('modal-subject').innerText = data.subject;
                    document.getElementById('modal-from').innerText = `${data.from.name || ''} <${data.from.address}>`;
                    document.getElementById('modal-date').innerText = new Date(data.createdAt).toLocaleString();

                    // Render HTML in Iframe (Security: srcdoc + sandbox)
                    // We inject some basic CSS to ensure it looks okay in dark mode
                    const isDark = document.documentElement.classList.contains('dark');
                    const cssInject = `
                        <style>
                            body { 
                                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
                                padding: 20px; 
                                color: ${isDark ? '#e2e8f0' : '#1e293b'};
                                word-wrap: break-word;
                            }
                            a { color: #6366f1; }
                            img { max-width: 100%; height: auto; }
                        </style>
                    `;
                    
                    // Prefer HTML, fallback to text
                    const bodyContent = data.html ? data.html[0] : `<p>${data.text.replace(/\n/g, '<br>')}</p>`;
                    iframe.srcdoc = cssInject + bodyContent;
                }
            } catch (error) {
                iframe.srcdoc = "Error loading message.";
                showToast('error', 'Could not load message details.');
            }
        }

        function closeModal() {
            const content = document.getElementById('modal-content');
            content.classList.add('translate-y-full');
            
            setTimeout(() => {
                document.getElementById('email-modal').classList.add('hidden');
                // clear iframe
                document.getElementById('modal-body-frame').srcdoc = '';
            }, 300);
        }

        // --- Utilities & Helpers ---

        function startAutoRefresh() {
            state.refreshInterval = setInterval(fetchInbox, 10000);
        }

        function startTimer() {
            const display = document.getElementById('timer-display');
            
            state.timerInterval = setInterval(() => {
                state.timer--;
                
                const minutes = Math.floor(state.timer / 60).toString().padStart(2, '0');
                const seconds = (state.timer % 60).toString().padStart(2, '0');
                display.innerText = `${minutes}:${seconds}`;

                // Warning colors
                if(state.timer < 60) {
                    display.classList.add('text-red-500');
                    display.classList.remove('text-indigo-600', 'dark:text-indigo-400');
                } else {
                    display.classList.remove('text-red-500');
                    display.classList.add('text-indigo-600', 'dark:text-indigo-400');
                }

                if (state.timer <= 0) {
                    showToast('info', 'Session expired. Generating new ID.');
                    resetSession();
                }
            }, 1000);
        }

        function resetSession() {
            // Animate card out
            document.getElementById('email-address').classList.add('opacity-50');
            startSession();
            document.getElementById('email-address').classList.remove('opacity-50');
        }

        // --- FIXED COPY FUNCTION WITH FALLBACK ---
        function copyToClipboard() {
            const emailInput = document.getElementById('email-address');
            const text = emailInput.value;

            if (!text || text === 'Loading...') return;
            
            // Try Modern Async API first (Works on localhost/HTTPS)
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast('success', 'Email copied successfully!'))
                    .catch(() => fallbackCopy(emailInput));
            } else {
                // If not secure context (e.g. file://), use fallback immediately
                fallbackCopy(emailInput);
            }
        }

        function fallbackCopy(inputElement) {
            try {
                inputElement.select();
                inputElement.setSelectionRange(0, 99999); // For mobile devices
                document.execCommand('copy');
                showToast('success', 'Email copied successfully!');
            } catch (err) {
                showToast('error', 'Failed to copy automatically.');
            }
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            state.isDarkMode = !state.isDarkMode;
            
            if (state.isDarkMode) {
                html.classList.add('dark');
                html.classList.remove('light');
                localStorage.setItem('hrz_theme', 'dark');
            } else {
                html.classList.remove('dark');
                html.classList.add('light');
                localStorage.setItem('hrz_theme', 'light');
            }
            applyThemeIcons();
        }

        function applyTheme() {
            if (state.isDarkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            applyThemeIcons();
        }

        function applyThemeIcons() {
            const sun = document.getElementById('icon-sun');
            const moon = document.getElementById('icon-moon');
            
            if (state.isDarkMode) {
                sun.classList.remove('hidden');
                moon.classList.add('hidden');
            } else {
                sun.classList.add('hidden');
                moon.classList.remove('hidden');
            }
        }

        /**
         * Toast Notification System
         */
        function showToast(type, message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // Styles based on type
            let colors = '';
            let icon = '';
            
            if(type === 'success') {
                colors = 'bg-green-500 text-white';
                icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
            } else if (type === 'error') {
                colors = 'bg-red-500 text-white';
                icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
            } else {
                colors = 'bg-indigo-500 text-white';
                icon = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            }

            toast.className = `${colors} px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 transform transition-all duration-300 translate-y-[-20px] opacity-0 pointer-events-auto`;
            toast.innerHTML = `
                <div>${icon}</div>
                <div class="text-sm font-medium">${message}</div>
            `;

            container.appendChild(toast);

            // Animate In
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-[-20px]', 'opacity-0');
            });

            // Auto Dismiss
            setTimeout(() => {
                toast.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        // --- Init ---
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
